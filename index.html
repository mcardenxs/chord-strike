<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎸 Chord Strike</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

      :root {
        /* Tema Oscuro por defecto */
        --bg-gradient: radial-gradient(circle at 50% 30%, #161424 0%, #08070d 100%);
        --ambient-glow-color: rgba(124, 76, 217, 0.06);
        --text-main: #f1eff7;
        --text-sub: #89869c;
        --panel-bg: rgba(25, 23, 38, 0.65);
        --panel-border: rgba(255, 255, 255, 0.08);
        --panel-shadow: rgba(0, 0, 0, 0.4);
        --input-bg: rgba(0, 0, 0, 0.35);
        --input-border: rgba(255, 255, 255, 0.12);
        --btn-bg: rgba(255, 255, 255, 0.06);
        --btn-border: rgba(255, 255, 255, 0.1);
        --btn-hover-bg: rgba(255, 255, 255, 0.12);
        --slider-track: rgba(255, 255, 255, 0.08);
        --game-container-border: rgba(255, 255, 255, 0.08);
        --mic-active-bg: rgba(76, 217, 100, 0.08);
        --mic-active-border: rgba(76, 217, 100, 0.25);
        --mic-color: #a39eb8;
        --mic-color-active: #4cd964;
      }

      body.light-theme {
        /* Tema Claro */
        --bg-gradient: radial-gradient(circle at 50% 30%, #fcfbf9 0%, #f5f2eb 100%);
        --ambient-glow-color: rgba(184, 150, 99, 0.04);
        --text-main: #3b3836;
        --text-sub: #8c8680;
        --panel-bg: rgba(235, 232, 228, 0.75);
        --panel-border: rgba(0, 0, 0, 0.08);
        --panel-shadow: rgba(0, 0, 0, 0.06);
        --input-bg: rgba(255, 255, 255, 0.85);
        --input-border: rgba(0, 0, 0, 0.12);
        --btn-bg: rgba(255, 255, 255, 0.6);
        --btn-border: rgba(0, 0, 0, 0.08);
        --btn-hover-bg: rgba(0, 0, 0, 0.04);
        --slider-track: rgba(0, 0, 0, 0.08);
        --game-container-border: rgba(0, 0, 0, 0.08);
        --mic-active-bg: rgba(92, 117, 102, 0.08);
        --mic-active-border: rgba(92, 117, 102, 0.25);
        --mic-color: #8c8680;
        --mic-color-active: #5c7566;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg-gradient);
        color: var(--text-main);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        font-family: 'Outfit', sans-serif;
        overflow: hidden;
        padding: 16px;
        transition: background 0.3s ease, color 0.3s ease;
      }

      /* Glow ambiental de fondo */
      .ambient-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 700px;
        height: 700px;
        background: radial-gradient(circle, var(--ambient-glow-color) 0%, rgba(0, 0, 0, 0) 70%);
        pointer-events: none;
        z-index: 0;
        transition: background 0.3s ease;
      }

      #game-wrapper {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        height: 100%;
        max-width: 1200px;
        gap: 16px;
      }

      /* Header */
      #header {
        display: flex;
        align-items: center;
        width: 100%;
        justify-content: space-between;
        padding: 0 4px;
        flex-shrink: 0;
      }

      #brand {
        display: flex;
        flex-direction: column;
      }

      #title {
        font-weight: 700;
        font-size: 24px;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, #ff3b30 0%, #ff2d55 30%, #007aff 70%, #4cd964 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.15));
      }

      #subtitle {
        font-size: 12px;
        color: var(--text-sub);
        font-weight: 400;
        margin-top: 2px;
        transition: color 0.3s ease;
      }

      /* Panel de Control superior */
      #controls-group {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      /* Afinador Digital */
      #tuner-panel {
        display: flex;
        align-items: center;
        gap: 12px;
        background: var(--panel-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        padding: 6px 14px;
        border-radius: 12px;
        border: 1px solid var(--panel-border);
        box-shadow: var(--panel-shadow);
        transition: all 0.3s ease;
      }

      .tuner-label {
        font-size: 9px;
        font-weight: 700;
        color: var(--text-sub);
        opacity: 0.7;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      #tuner-note {
        font-weight: 700;
        font-size: 15px;
        color: #ffcc00;
        width: 32px;
        text-align: center;
      }

      #tuner-hz {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-sub);
        width: 54px;
        transition: color 0.3s ease;
      }

      .tuner-gauge {
        width: 70px;
        height: 6px;
        background: var(--slider-track);
        border-radius: 3px;
        position: relative;
        overflow: hidden;
      }

      #tuner-needle {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 3px;
        height: 100%;
        background: #4cd964;
        transition: left 0.1s ease;
        box-shadow: 0 0 6px #4cd964;
      }

      /* Panel de Control de BPM */
      #bpm-panel {
        display: flex;
        align-items: center;
        gap: 12px;
        background: var(--panel-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        padding: 6px 14px;
        border-radius: 12px;
        border: 1px solid var(--panel-border);
        box-shadow: var(--panel-shadow);
        transition: all 0.3s ease;
      }

      .control-group {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .bpm-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-sub);
        letter-spacing: 0.5px;
        transition: color 0.3s ease;
      }

      #bpm-input {
        background: var(--input-bg);
        border: 1px solid var(--input-border);
        color: var(--text-main);
        width: 48px;
        height: 26px;
        text-align: center;
        font-weight: 700;
        font-size: 13px;
        border-radius: 6px;
        outline: none;
        font-family: 'Outfit', sans-serif;
        transition: all 0.3s ease;
      }

      .bpm-btn {
        width: 26px;
        height: 26px;
        background: var(--btn-bg);
        border: 1px solid var(--btn-border);
        color: var(--text-main);
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
      }

      .bpm-btn:hover {
        background: var(--btn-hover-bg);
      }

      #bpm-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 90px;
        height: 4px;
        background: var(--slider-track);
        border-radius: 2px;
        outline: none;
        transition: background 0.3s ease;
      }

      #bpm-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: linear-gradient(135deg, #007aff 0%, #0056b3 100%);
        cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.85);
      }

      #metronome-toggle {
        background: var(--btn-bg);
        border: 1px solid var(--btn-border);
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
        padding: 4px 8px;
        color: var(--text-sub);
        transition: all 0.2s ease;
      }

      #metronome-toggle:hover {
        background: var(--btn-hover-bg);
      }

      #metronome-toggle.active {
        color: #4cd964;
        background: rgba(76, 217, 100, 0.12);
        border-color: rgba(76, 217, 100, 0.35);
      }

      /* Botón de cambio de tema */
      #theme-toggle {
        background: var(--btn-bg);
        border: 1px solid var(--btn-border);
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-main);
        transition: all 0.2s ease;
        outline: none;
      }

      #theme-toggle:hover {
        background: var(--btn-hover-bg);
      }

      /* Contenedor del Juego Fluido */
      #game-container {
        position: relative;
        width: 100%;
        flex-grow: 1; /* Crece para ocupar todo el espacio vertical sobrante */
        border: 1px solid var(--game-container-border);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        border-radius: 12px;
        overflow: hidden;
        background: #08070d;
        transition: border 0.3s ease;
      }

      #game-container canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* Footer */
      #footer {
        display: flex;
        gap: 32px;
        width: 100%;
        justify-content: center;
        flex-shrink: 0;
        padding-top: 4px;
      }

      .hint {
        font-size: 11px;
        color: var(--text-sub);
        font-weight: 400;
        transition: color 0.3s ease;
      }

      .hint span {
        color: #ff2d55;
        font-weight: 600;
      }

      .hint.mic-hint span {
        color: #007aff;
      }

      /* Estado del Micrófono */
      #mic-status {
        position: fixed;
        bottom: 16px;
        right: 16px;
        padding: 6px 12px;
        border: 1px solid var(--panel-border);
        border-radius: 20px;
        font-size: 9px;
        font-weight: 600;
        color: var(--mic-color);
        letter-spacing: 0.5px;
        background: var(--panel-bg);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        z-index: 100;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        display: flex;
        align-items: center;
        transition: all 0.3s ease;
      }

      #mic-status.active {
        border-color: var(--mic-active-border);
        color: var(--mic-color-active);
        background: var(--mic-active-bg);
      }

      #mic-status .dot {
        display: inline-block;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: currentColor;
        margin-right: 6px;
        animation: pulse 1.8s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(1.1); }
      }
    </style>
  </head>
  <body>
    <div class="ambient-glow"></div>

    <div id="game-wrapper">
      <div id="header">
        <div id="brand">
          <div id="title">🎸 Chord Strike</div>
          <div id="subtitle">Entrena tu afinación y acordes en tiempo real</div>
        </div>
        
        <div id="controls-group">
          <!-- Widget del Afinador -->
          <div id="tuner-panel">
            <span class="tuner-label">AFINADOR</span>
            <div id="tuner-note">-</div>
            <div id="tuner-hz">0.0 Hz</div>
            <div class="tuner-gauge">
              <div id="tuner-needle"></div>
            </div>
          </div>

          <!-- Control de BPM -->
          <div id="bpm-panel">
            <div class="control-group">
              <span class="bpm-label">BPM</span>
              <button id="bpm-minus" class="bpm-btn">-</button>
              <input type="number" id="bpm-input" min="10" max="250" value="60" />
              <button id="bpm-plus" class="bpm-btn">+</button>
            </div>
            <input type="range" id="bpm-slider" min="10" max="250" value="60" />
            <button id="metronome-toggle" class="control-btn" title="Activar metrónomo">🔇</button>
          </div>

          <!-- Botón de cambio de tema -->
          <button id="theme-toggle" title="Cambiar tema">🌙</button>
        </div>
      </div>

      <div id="game-container">
        <!-- Phaser monta el canvas aquí -->
      </div>

      <div id="footer">
        <div class="hint"><span>CLICK</span> para destruir notas manualmente</div>
        <div class="hint">Las notas caen — no dejes que superen la línea roja</div>
        <div class="hint mic-hint"><span>MICRÓFONO</span> activo — toca notas reales para disparar</div>
      </div>
    </div>

    <div id="mic-status">
      <span class="dot"></span>MIC ESPERA
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
