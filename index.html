<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎸 Chord Strike</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #f5f2eb; /* Fondo crema cálido y sutil */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: 'Outfit', sans-serif;
        overflow: hidden;
      }

      #game-wrapper {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      /* Header */
      #header {
        display: flex;
        align-items: center;
        gap: 16px;
        width: 800px;
        justify-content: space-between;
      }

      #title {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 24px;
        color: #3b3836; /* Carbón cálido */
        letter-spacing: 0.5px;
      }

      #subtitle {
        font-size: 13px;
        color: #8c8680; /* Arcilla grisácea suave */
        font-weight: 400;
        margin-top: 2px;
      }

      /* Canvas container minimalista */
      #game-container {
        position: relative;
        border: 1px solid #e3ded9;
        box-shadow:
          0 10px 30px rgba(0, 0, 0, 0.04),
          0 1px 8px rgba(0, 0, 0, 0.02);
        border-radius: 6px;
        overflow: hidden;
      }

      #game-container canvas {
        display: block;
      }

      /* Footer / instrucciones */
      #footer {
        display: flex;
        gap: 32px;
        width: 800px;
        justify-content: center;
        margin-top: 4px;
      }

      .hint {
        font-size: 11px;
        color: #8c8680;
        letter-spacing: 0.5px;
        font-weight: 400;
      }

      .hint span {
        color: #5c7566; /* Verde musgo suave para destacar */
        font-weight: 600;
      }

      /* Mic status badge minimalista */
      #mic-status {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 8px 16px;
        border: 1px solid #dfdad4;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 500;
        color: #706c68;
        letter-spacing: 0.5px;
        background: #ebe8e4;
        z-index: 100;
        box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        transition: all 0.3s ease;
      }

      #mic-status.active {
        border-color: #d1dfd4;
        color: #4a5c4e;
        background: #e8efe9;
        box-shadow: 0 4px 12px rgba(74, 92, 78, 0.05);
      }

      #mic-status .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        margin-right: 8px;
        vertical-align: middle;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
    </style>
  </head>
  <body>
    <div id="game-wrapper">
      <div id="header">
        <div>
          <div id="title">🎸 Chord Strike</div>
          <div id="subtitle">Destroy the notes — feel the beat</div>
        </div>
      </div>

      <div id="game-container">
        <!-- Phaser monta el canvas aquí -->
      </div>

      <div id="footer">
        <div class="hint"><span>CLICK</span> sobre las notas para destruirlas</div>
        <div class="hint">Las notas caen — no dejes que lleguen abajo</div>
        <div class="hint"><span>MIC</span> integrado — toca para destruir notas</div>
      </div>
    </div>

    <div id="mic-status">
      <span class="dot"></span>MIC STANDBY
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
